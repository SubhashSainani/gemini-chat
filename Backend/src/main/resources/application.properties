spring.application.name=gemini-chat
spring.main.web-application-type=servlet

gemini.api.url=${GEMINI_API_URL}
gemini.api.key=${GEMINI_API_KEY}

# Database: PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/geminidb
spring.datasource.username=postgres
spring.datasource.password=Domain#12!@
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Security Secret
jwt.secret=vibe_coding_gemini_secret_replace_this_in_production

# Rate Limiter
resilience4j.ratelimiter.instances.geminiApi.limitForPeriod=100
resilience4j.ratelimiter.instances.geminiApi.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.geminiApi.timeoutDuration=5s
